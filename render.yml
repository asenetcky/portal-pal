# render.yaml — Infrastructure as Code for Render
services:
  - type: web
    name: production-langgraph-api
    runtime: python
    region: virginia
    plan: free
    buildCommand: pip install uv && uv sync --frozen --no-dev
    startCommand: uv run uvicorn backend.main:app --app-dir apps/backend/src --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.14"
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: RATE_LIMIT
        value: "20/minute"
      - key: CACHE_TTL_SECONDS
        value: "300"
      - key: MAX_RETRIES
        value: "3"
      - key: PRIMARY_MODEL
        value: gpt-5.4-nano-2026-03-17
      - key: FALLBACK_MODEL
        value: gpt-5-nano-2025-08-07
      - key: OPENAI_API_KEY
        sync: false # Must be set manually — NEVER commit secrets
      - key: PORTAL_PAL_API_KEY
        sync: false # Must be set manually — share this with trusted users only
      - key: LANGSMITH_API_KEY
        sync: false # Must be set manually
      - key: LANGSMITH_TRACING
        value: "true"
      - key: LANGSMITH_PROJECT
        value: portal-pal
    healthCheckPath: /health
    autoDeploy: true
